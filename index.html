<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Evolution: Merge to Sun</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --space-bg: #050505;
            --nebula-purple: rgba(108, 92, 231, 0.2);
            --nebula-blue: rgba(9, 132, 227, 0.2);
            --glass-bg: rgba(15, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f5f6fa;
            --accent-gold: #f1c40f;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--space-bg);
            background-image: 
                radial-gradient(circle at 20% 30%, var(--nebula-purple) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--nebula-blue) 0%, transparent 40%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            color: var(--text-light);
        }

        /* 별 배경 효과 */
        .stars-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        #game-wrapper {
            position: relative;
            width: 450px;
            height: 750px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5), 0 0 20px rgba(108, 92, 231, 0.2);
            border: 2px solid var(--glass-border);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: 10px;
            font-weight: 800;
            color: #8395a7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .value {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-light);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        #next-preview-container {
            width: 80px;
            height: 80px;
            justify-content: center;
        }

        #next-preview {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 15, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #game-over.show {
            display: flex;
            opacity: 1;
        }

        #game-over h1 {
            font-size: 48px;
            font-weight: 900;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff 0%, #74b9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        #game-over p {
            font-size: 20px;
            color: #a4b0be;
            margin: 0 0 40px 0;
        }

        .btn-restart {
            padding: 18px 56px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
            transition: all 0.3s;
        }

        .btn-restart:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(108, 92, 231, 0.6);
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>

    <div id="game-wrapper">
        <div id="ui-overlay">
            <div class="glass-panel">
                <span class="label">Cosmic Score</span>
                <span id="score-value" class="value">0</span>
            </div>
            <div class="glass-panel" id="next-preview-container">
                <span class="label">Next</span>
                <div id="next-preview"></div>
            </div>
        </div>

        <!-- 오디오 컨트롤 -->
        <button id="audio-toggle" class="glass-panel" style="position: absolute; bottom: 24px; left: 24px; pointer-events: auto; padding: 12px; cursor: pointer;">
            <span id="audio-icon">🔊</span>
        </button>

        <div id="game-over">
            <h1>MISSION FAILED</h1>
            <p>Galaxy Exploration Score: <span id="final-score">0</span></p>
            <button class="btn-restart" onclick="location.reload()">RE-EXPLORE</button>
        </div>

        <div id="game-container"></div>
    </div>

    <script>
        // 배경 별 생성 로직
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            starsContainer.appendChild(star);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
